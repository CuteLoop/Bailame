<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Bailame — minigame</title>
    <style>
      html, body { margin: 0; height: 100%; }
      body {
        display: grid;
        place-items: center;
        min-height: 100dvh;
        background: #14121a;
        overflow: hidden;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      /* scale the fixed-resolution canvas to fit any phone, keeping aspect ratio */
      #app canvas {
        display: block;
        width: auto;
        height: auto;
        max-width: 100vw;
        max-height: 100dvh;
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="/src/mini1/main.js"></script>
  </body>
</html>
